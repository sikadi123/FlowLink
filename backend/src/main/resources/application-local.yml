spring:
  datasource:
    url: jdbc:h2:mem:flowlink;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql
  h2:
    console:
      enabled: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

flowlink:
  storage:
    mode: local
    local-dir: uploads
    public-path: /uploads
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: flowlink
    public-base-url: http://localhost:9000/flowlink

mybatis:
  configuration:
    map-underscore-to-camel-case: true
