server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/flowlink?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: flowlink
    password: flowlink123
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

mybatis:
  configuration:
    map-underscore-to-camel-case: true

flowlink:
  storage:
    mode: minio
    local-dir: uploads
    public-path: /uploads
  netty:
    port: 8090
    path: /ws
  session:
    ttl-seconds: 604800
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: flowlink
    public-base-url: http://localhost:9000/flowlink
  ai:
    enabled: true
    assistant-user-id: 9001
    base-url: ${FLOWLINK_AI_BASE_URL:https://api.openai.com/v1/chat/completions}
    api-key: ${FLOWLINK_AI_API_KEY:}
    model: ${FLOWLINK_AI_MODEL:gpt-4o-mini}
