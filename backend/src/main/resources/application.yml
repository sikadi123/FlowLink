server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/flowlink?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis:
  configuration:
    map-underscore-to-camel-case: true

flowlink:
  netty:
    port: 8090
    path: /ws
  session:
    ttl-seconds: 604800
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: flowlink
    public-base-url: http://localhost:9000/flowlink
